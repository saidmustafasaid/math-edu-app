services:
  - type: web
    name: math-edu-app
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate
      php artisan migrate --force
    startCommand: |
      php artisan serve --host=0.0.0.0 --port=8000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: base64:YOUR-KEY-HERE
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: YOUR-DB-HOST
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: YOUR-DB-NAME
      - key: DB_USERNAME
        value: YOUR-DB-USERNAME
      - key: DB_PASSWORD
        value: YOUR-DB-PASSWORD
