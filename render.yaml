services:
  - type: web
    name: math-edu-app
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    buildCommand: |
      composer install
      php artisan key:generate
      php artisan migrate --force
    startCommand: |
      php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: YOUR-GENERATED-KEY-HERE
      - key: DB_CONNECTION
        value: pgsql
